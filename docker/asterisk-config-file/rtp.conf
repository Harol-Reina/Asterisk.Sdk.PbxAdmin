[general]
; Narrow RTP port range for Docker port mapping.
; 50 ports = up to 25 concurrent calls (2 ports per call).
; Offset from realtime server to avoid host port conflicts.
rtpstart=20100
rtpend=20150
; Local TURN/STUN server (coturn container on host network).
stunaddr=${EXTERNAL_IP}:3478
turnaddr=${EXTERNAL_IP}:3478
turnusername=pbxadmin
turnpassword=pbxadmin
