[general]
; Narrow RTP port range for Docker port mapping.
; 50 ports = up to 25 concurrent calls (2 ports per call).
; Offset from realtime server to avoid host port conflicts.
rtpstart=20100
rtpend=20150

; ice_host_candidates section is appended by entrypoint-asterisk.sh
; mapping the container IP to EXTERNAL_IP for WebRTC ICE.

[ice_host_candidates]
172.18.0.3 => 192.168.40.35
