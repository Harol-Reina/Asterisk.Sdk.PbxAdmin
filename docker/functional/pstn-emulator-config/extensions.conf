; PSTN Emulator — Dialplan
; Provides 10 test scenarios (extensions 1001-1010) that simulate
; different PSTN call behaviors, plus outbound contexts for originating
; calls into the realtime and file PBX servers.

[general]
static = yes
writeprotect = no

[globals]

; =====================================================
; PSTN Scenarios (inbound from PBX servers via trunk)
; Both PBX servers route 1001-1010 here via their pstn-trunk endpoints.
; =====================================================
[default]

; 1001 — Normal answer: picks up, plays greeting, hangs up
exten => 1001,1,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-congrats)
 same => n,Wait(2)
 same => n,Hangup()

; 1002 — Busy: immediately returns busy signal
exten => 1002,1,Busy(10)
 same => n,Hangup()

; 1003 — No answer: rings for 30s then hangs up (never answers)
exten => 1003,1,Wait(30)
 same => n,Hangup()

; 1004 — Congestion: returns network congestion
exten => 1004,1,Congestion(10)
 same => n,Hangup()

; 1005 — Voicemail simulation: answers, plays unavailable message
exten => 1005,1,Answer()
 same => n,Wait(1)
 same => n,Playback(vm-theperson)
 same => n,Playback(vm-isunavail)
 same => n,Playback(vm-leavemsg)
 same => n,Wait(10)
 same => n,Hangup()

; 1006 — DTMF test: answers and reads back any digits pressed
exten => 1006,1,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-enterkeypad)
 same => n,Read(DIGITS,,6,,,10)
 same => n,SayDigits(${DIGITS})
 same => n,Wait(2)
 same => n,Hangup()

; 1007 — IVR simulation: simple auto-attendant with options
exten => 1007,1,Answer()
 same => n,Wait(1)
 same => n(menu),Playback(demo-abouttotry)
 same => n,WaitExten(5)

exten => 1,1,Playback(digits/1)
 same => n,Goto(default,1007,menu)
exten => 2,1,Playback(digits/2)
 same => n,Goto(default,1007,menu)
exten => 3,1,Playback(demo-congrats)
 same => n,Hangup()
exten => i,1,Playback(pbx-invalid)
 same => n,Goto(default,1007,menu)
exten => t,1,Playback(vm-goodbye)
 same => n,Hangup()

; 1008 — Long call: answers and holds the line for 5 minutes
exten => 1008,1,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-congrats)
 same => n,MusicOnHold(default,300)
 same => n,Hangup()

; 1009 — Echo test: answers and echoes audio back to caller
exten => 1009,1,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; 1010 — Quick answer: picks up and hangs up almost immediately
exten => 1010,1,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 same => n,Wait(1)
 same => n,Hangup()

; =====================================================
; Incoming from PBX servers (if they route calls here)
; =====================================================
[from-trunk]
; Route any incoming calls to the default context scenarios
exten => _X.,1,Goto(default,${EXTEN},1)

; =====================================================
; Outbound: originate calls into the realtime PBX
; Used by E2E tests or AMI Originate to simulate incoming PSTN calls.
; Example: Originate channel Local/200@pstn-to-realtime to simulate
;          an external caller dialing into the IVR at extension 200.
; =====================================================
[pstn-to-realtime]
exten => _X.,1,Set(CALLERID(num)=5551234567)
 same => n,Set(CALLERID(name)=PSTN Caller)
 same => n,Dial(PJSIP/${EXTEN}@trunk-realtime,60)
 same => n,Hangup()

; =====================================================
; Outbound: originate calls into the file PBX
; =====================================================
[pstn-to-file]
exten => _X.,1,Set(CALLERID(num)=5559876543)
 same => n,Set(CALLERID(name)=PSTN Caller)
 same => n,Dial(PJSIP/${EXTEN}@trunk-file,60)
 same => n,Hangup()
