; PSTN Emulator — PJSIP configuration
; Simulates an external PSTN gateway that connects to both demo PBX servers.
; Uses a single catch-all endpoint since all traffic comes from Docker peers.

[system]
type = system

[global]
type = global

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; --- Single endpoint for all PBX traffic ---
; Both demo PBX servers route outbound calls here.
; We use a single endpoint with multiple identify matches
; since all inbound calls land in the same [from-pbx] context.

[pbx-trunk]
type = endpoint
context = from-pbx
disallow = all
allow = ulaw
allow = alaw
transport = transport-udp
direct_media = no
rtp_symmetric = yes
force_rport = yes
callerid = "PSTN Gateway" <5551000000>

; Identify by matching the entire Docker default subnet.
; This avoids hostname resolution failures at startup.
[pbx-trunk-identify]
type = identify
endpoint = pbx-trunk
match = 172.16.0.0/12

; --- Outbound AORs (for originating calls into PBX servers) ---

[realtime-aor]
type = aor
contact = sip:asterisk-realtime:5060
qualify_frequency = 30

[file-aor]
type = aor
contact = sip:asterisk-file:5060
qualify_frequency = 30
