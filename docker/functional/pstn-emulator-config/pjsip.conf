; PSTN Emulator — PJSIP configuration
; Simulates an external PSTN gateway that connects to both demo PBX servers.

[system]
type = system

[global]
type = global

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; --- Trunk to Realtime PBX (asterisk-realtime) ---

[trunk-realtime]
type = endpoint
context = from-trunk
disallow = all
allow = ulaw
allow = alaw
transport = transport-udp
direct_media = no
rtp_symmetric = yes
force_rport = yes
callerid = "PSTN Gateway" <5551000000>
aors = trunk-realtime-aor

[trunk-realtime-aor]
type = aor
contact = sip:asterisk-realtime:5060
qualify_frequency = 30

[trunk-realtime-identify]
type = identify
endpoint = trunk-realtime
match = asterisk-realtime

; --- Trunk to File PBX (asterisk-file) ---

[trunk-file]
type = endpoint
context = from-trunk
disallow = all
allow = ulaw
allow = alaw
transport = transport-udp
direct_media = no
rtp_symmetric = yes
force_rport = yes
callerid = "PSTN Gateway" <5551000000>
aors = trunk-file-aor

[trunk-file-aor]
type = aor
contact = sip:asterisk-file:5060
qualify_frequency = 30

[trunk-file-identify]
type = identify
endpoint = trunk-file
match = asterisk-file
