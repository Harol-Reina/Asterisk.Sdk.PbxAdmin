; PSTN Emulator — AMI configuration
; Allows E2E tests and PbxAdmin to originate calls via this emulator.

[general]
enabled = yes
port = 5038
bindaddr = 0.0.0.0

[pstn-admin]
secret = pstn-admin
read = system,call,agent,user,config,originate,reporting,command
write = system,call,agent,user,config,originate,command
deny = 0.0.0.0/0.0.0.0
permit = 0.0.0.0/0.0.0.0

[loadtest]
secret = loadtest
read = system,call,agent,user,config,originate,reporting,command
write = system,call,agent,user,config,originate,command
deny = 0.0.0.0/0.0.0.0
permit = 0.0.0.0/0.0.0.0
