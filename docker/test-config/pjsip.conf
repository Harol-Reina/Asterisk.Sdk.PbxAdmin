[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

[2000]
type = endpoint
context = default
disallow = all
allow = ulaw
allow = alaw
auth = 2000-auth
aors = 2000-aors

[2000-auth]
type = auth
auth_type = userpass
username = 2000
password = test2000

[2000-aors]
type = aor
max_contacts = 1

[3000]
type = endpoint
context = default
disallow = all
allow = ulaw
allow = alaw
auth = 3000-auth
aors = 3000-aors

[3000-auth]
type = auth
auth_type = userpass
username = 3000
password = test3000

[3000-aors]
type = aor
max_contacts = 1
