[general]
static = no
writeprotect = no
clearglobalvars = no

[globals]

[default]
; Enable realtime dialplan lookup for DB-generated IVR contexts
switch => Realtime/@
; Inbound to queues
exten => 100,1,Answer()
same => n,Queue(sales,,,,300)
same => n,Hangup()

exten => 101,1,Answer()
same => n,Queue(support,,,,300)
same => n,Hangup()

exten => 105,1,Answer()
same => n,Queue(loadtest,,,,300)
same => n,Hangup()

; Explicit failure destination for SDK load test validation
exten => 999,1,Progress()
same => n,Congestion(10)
same => n,Hangup()

; Conference rooms
exten => 800,1,Answer()
same => n,MeetMe(800,dM)
same => n,Hangup()

exten => 801,1,Answer()
same => n,ConfBridge(801,default_bridge,default_user)
same => n,Hangup()

; Direct extension dialing (PJSIP)
exten => _2XXX,1,Dial(PJSIP/${EXTEN},30)
same => n,Hangup()

exten => _3XXX,1,Dial(PJSIP/${EXTEN},30)
same => n,Hangup()

; Route to file PBX extensions via trunk
exten => _4XXX,1,Dial(PJSIP/${EXTEN}@trunk-file,30)
same => n,Hangup()

exten => _5XXX,1,Dial(PJSIP/${EXTEN}@trunk-file,30)
same => n,Hangup()

; PSTN Emulator routes (1001-1010)
; 1001=answer, 1002=busy, 1003=no-answer, 1004=congestion
; 1005=voicemail, 1006=dtmf, 1007=ivr, 1008=long, 1009=echo, 1010=quick
exten => _100X,1,Dial(PJSIP/${EXTEN}@pstn-trunk-db,30)
same => n,Hangup()
exten => 1010,1,Dial(PJSIP/1010@pstn-trunk-db,30)
same => n,Hangup()

; Parking
exten => 700,1,Answer()
same => n,Park(default)
same => n,Hangup()

; Agent login/logout
exten => *11,1,AgentLogin()
exten => *12,1,AgentLogoff()

; Feature codes
exten => *72,1,Set(DB(CF/${CALLERID(num)})=${EXTEN:3})
same => n,Playback(beep)
same => n,Hangup()

exten => *73,1,NoOp(Cancel Call Forward)
same => n,Set(DB_DELETE(CF/${CALLERID(num)})=)
same => n,Playback(beep)
same => n,Hangup()

exten => *67,1,Set(CALLERID(name-pres)=prohib)
same => n,Set(CALLERID(num-pres)=prohib)
same => n,Playback(beep)
same => n,Hangup()

exten => *69,1,NoOp(Last Call Return)
same => n,Set(LAST=${DB(LASTCALLER/${CALLERID(num)})})
same => n,GotoIf($["${LAST}" = ""]?nodata)
same => n,Dial(PJSIP/${LAST},30)
same => n,Hangup()
same => n(nodata),Playback(vm-norecord)
same => n,Hangup()

exten => *70,1,NoOp(Call Waiting Toggle)
same => n,Playback(beep)
same => n,Hangup()

exten => *78,1,Set(DB(DND/${CALLERID(num)})=yes)
same => n,Playback(beep)
same => n,Hangup()

exten => *79,1,NoOp(DND Off)
same => n,Set(DB_DELETE(DND/${CALLERID(num)})=)
same => n,Playback(beep)
same => n,Hangup()

; Spanish IVR entry point
exten => 200,1,Goto(ivr-empresa,s,1)

[parkedcalls]
; Parked call pickup
exten => _7XX,1,ParkedCall(default,${EXTEN})


