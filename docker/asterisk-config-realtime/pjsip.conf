; PJSIP config for realtime server
; ALL endpoints, trunks, auth, and aors come from the database via sorcery.conf
; Only transport, system, and global stay in this file.

[system]
type = system

[global]
type = global

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

[transport-ws]
type = transport
protocol = ws
bind = 0.0.0.0:8180
; external_media_address and local_net are injected by the entrypoint
; script from the EXTERNAL_IP environment variable.
external_media_address = ${EXTERNAL_IP}
external_signaling_address = ${EXTERNAL_IP}
local_net = 172.16.0.0/12
local_net = 10.0.0.0/8

[transport-wss]
type = transport
protocol = wss
bind = 0.0.0.0:8089
external_media_address = ${EXTERNAL_IP}
external_signaling_address = ${EXTERNAL_IP}
local_net = 172.16.0.0/12
local_net = 10.0.0.0/8
