[res_pjsip]
; Cached PJSIP objects — first lookup hits memory cache, miss falls through to DB.
; Eliminates ~70-80% of ODBC queries during call processing.
; Options: name (CLI id), maximum_objects, object_lifetime_maximum (secs), expire_on_reload.
endpoint/cache=memory_cache,name=pjsip_endpoint_cache,maximum_objects=1000,object_lifetime_maximum=900,expire_on_reload=yes
endpoint=realtime,ps_endpoints

auth/cache=memory_cache,name=pjsip_auth_cache,maximum_objects=1000,object_lifetime_maximum=900,expire_on_reload=yes
auth=realtime,ps_auths

aor/cache=memory_cache,name=pjsip_aor_cache,maximum_objects=1000,object_lifetime_maximum=900,expire_on_reload=yes
aor=realtime,ps_aors

; Contacts change on every REGISTER — no cache, use astdb as before
contact=astdb,registrator

[res_pjsip_endpoint_identifier_ip]
identify=realtime,ps_endpoint_id_ips
