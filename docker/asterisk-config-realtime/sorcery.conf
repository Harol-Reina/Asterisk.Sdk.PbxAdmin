[res_pjsip]
; Cached PJSIP objects — first lookup hits DB, subsequent reads served from memory.
; Cache config in res_sorcery_memory_cache.conf (TTL, max objects).
; Eliminates ~70-80% of ODBC queries during call processing.
endpoint=memory_cache,pjsip_endpoint_cache
endpoint=realtime,ps_endpoints

auth=memory_cache,pjsip_auth_cache
auth=realtime,ps_auths

aor=memory_cache,pjsip_aor_cache
aor=realtime,ps_aors

; Contacts change on every REGISTER — no cache, use astdb as before
contact=astdb,registrator

[res_pjsip_endpoint_identifier_ip]
identify=realtime,ps_endpoint_id_ips
