[modules]
autoload = yes

; ODBC and sorcery must load before any realtime-dependent module
preload = res_odbc.so
preload = res_config_odbc.so
preload = res_sorcery_config.so
preload = res_sorcery_memory.so
preload = res_sorcery_realtime.so

; CDR / CEL to database
load = cdr_odbc.so
load = cel_odbc.so

; Disable modules that cause noise in logs or crash
noload = res_config_ldap.so
noload = res_config_pgsql.so
noload = res_hep_pjsip.so
noload = res_hep_rtcp.so
noload = res_prometheus.so
noload = res_pjsip_outbound_registration.so

; Missing library (libvorbisenc)
noload = format_ogg_vorbis.so

; CDR/CEL backends we don't use (we use ODBC)
noload = cdr_pgsql.so
noload = cdr_sqlite3_custom.so
noload = cdr_csv.so
noload = cel_sqlite3_custom.so

; Not needed
noload = cel_pgsql.so
noload = res_phoneprov.so
noload = res_pjsip_phoneprov_provider.so

; No sound hardware in container
noload = chan_alsa.so
noload = chan_console.so

; Suppress base-image AEL warnings
noload = pbx_ael.so

; Deprecated in Asterisk 22
noload = res_adsi.so
noload = app_adsiprog.so
noload = app_getcpeid.so
