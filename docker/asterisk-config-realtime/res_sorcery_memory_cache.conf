; Sorcery memory cache configuration
; Referenced by sorcery.conf wizard mappings (memory_cache,<name>)
; Caches PJSIP objects to reduce ODBC pool pressure under load.

[pjsip_endpoint_cache]
maximum_objects=1000
object_lifetime_maximum=900
expire_on_reload=yes

[pjsip_auth_cache]
maximum_objects=1000
object_lifetime_maximum=900
expire_on_reload=yes

[pjsip_aor_cache]
maximum_objects=1000
object_lifetime_maximum=900
expire_on_reload=yes
